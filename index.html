<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="container">
        <div id="screen"></div>
        <div id="container-buttons">
            <div id="buttons">
                <button id="clear">🗑️</button>
                <button class="operator" value="+">+</button>
                <button class="operator" value="-">-</button>
                <button class="operator" value="x">x</button>
                <button class="operator" value="/">/</button>
                <button class="btn-nums" value="1">1</button>
                <button class="btn-nums" value="2">2</button>
                <button class="btn-nums" value="3">3</button>
                <button class="btn-nums" value="4">4</button>
                <button class="btn-nums" value="5">5</button>
                <button class="btn-nums" value="6">6</button>
                <button class="btn-nums" value="7">7</button>
                <button class="btn-nums" value="8">8</button>
                <button class="btn-nums" value="9">9</button>
                <button class="btn-nums" value="0">0</button>
                <button id="process">=</button>
            </div>
        </div>
    </div>
</body>
</html>
